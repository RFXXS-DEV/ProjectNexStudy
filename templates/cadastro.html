<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyOS</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="min-h-screen">

    <!-- Página inteira -->
    <main class="flex min-h-screen">

        <!-- ========================================= -->
        <!-- LADO ESQUERDO - IMAGEM -->
        <!-- ========================================= -->
        <section class="w-1/2 h-screen">

            <img
                src="{{ url_for('static', filename='img/FundoLoginCadastro.jpg') }}"
                alt="Imagem de fundo"
                class="w-full h-full object-cover">

        </section>


        <!-- ========================================= -->
        <!-- LADO DIREITO -->
        <!-- ========================================= -->
        <section class="w-1/2 h-screen flex items-center justify-center bg-green-100">

            <!-- Container principal -->
            <div class="w-full max-w-md px-0 flex flex-col items-center">

                <!-- Logo -->
                <img
                    src="{{ url_for('static', filename='img/LogoNexStudy.png') }}"
                    alt="Logo NexStudy"
                    class="w-48 mb-0">

                <!-- Título -->
                <h1 class="text-4xl font-extrabold text-green-700 mb-8 font-serif border-b-2">
                    Bem-vindo ao NexStudy
                </h1>

                <!-- ================================= -->
                <!-- FORMULÁRIO -->
                <!-- ================================= -->

                <form
                    action=""
                    method="POST"
                    class="w-full flex flex-col gap-2">

                    <!-- Nome -->
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        placeholder="Nome"
                        required
                        class="w-full h-16 px-4 text-lg rounded-2xl border bg-white justify-center font-semibold focus:text-green-700 focus:transition focus:duration-400 border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 ">

                    <!-- Email -->
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="E-mail"
                        required
                        class="w-full h-16 px-4 text-lg rounded-2xl border bg-white justify-center font-semibold focus:text-green-700 focus:transition focus:duration-400 border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">

                    <!-- Senha -->
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Senha"
                        required
                        class="w-full h-16 px-4 text-lg rounded-2xl border bg-white justify-center font-semibold focus:text-green-700 focus:transition focus:duration-400 border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">

                    <!-- Confirmar senha -->
                    <input
                        type="password"
                        id="confirmar_senha"
                        name="confirmar_senha"
                        placeholder="Confirmar senha"
                        required
                        class="w-full h-16 px-4 text-lg rounded-2xl border bg-white justify-center font-semibold focus:text-green-700 focus:transition focus:duration-400 border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">

                    <!-- Botão -->
                    <button
                        type="submit"
                        class="w-full h-16 text-lg rounded-2xl bg-green-700 text-white font-semibold hover:bg-green-800 transition duration-200 cursor-pointer">

                        Criar conta

                    </button>

                </form>

                <!-- Link -->
                <p class="mt-6 text-sm text-gray-600">

                    Já possui conta?

                    <a
                        href="{{ url_for('login') }}"
                        class="text-green-700 font-semibold hover:underline">

                        Entrar

                    </a>

                </p>

            </div>

        </section>

    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
